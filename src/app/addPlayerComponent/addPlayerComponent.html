<div class="add-player-overlay">
  <div class="add-player-card shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Añadir nuevo jugador</h5>
      <button class="btn-close" (click)="cancel()" aria-label="Cerrar"></button>
    </div>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <form (ngSubmit)="save()" class="h-75">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input [(ngModel)]="jugador.nombre" name="nombre" class="form-control" required />
      </div>
      <div class="mb-3 flex">
        <label class="form-label">Imagen</label>
        <input [(ngModel)]="jugador.img" name="img" type="file" (change)="onFileSelected($event)" accept="image/*">
      </div>
      <div class="mb-3">
        <label class="form-label">URL video</label>
        <input [(ngModel)]="jugador.vid" name="vid" class="form-control" />
      </div>
      <div class="mb-3">
        <label class="form-label">Altura</label>
        <input [(ngModel)]="jugador.altura" name="altura" class="form-control" type="number" />
      </div>
      <div class="mb-3">
        <label class="form-label">Edad</label>
        <input [(ngModel)]="jugador.edad" name="edad" class="form-control" type="number" />
      </div>
      <div class="mb-3">
        <label class="form-label">Equipo</label>
        <input [(ngModel)]="jugador.equipo" name="equipo" class="form-control" />
      </div>
      <div class="mb-3">
        <label class="form-label">Posición</label>
        <input [(ngModel)]="jugador.posicion" name="posicion" class="form-control" />
      </div>
      <div class="mb-3">
        <label class="form-label">aPP</label>
        <input [(ngModel)]="jugador.aPP" name="aPP" class="form-control" type="number" />
      </div>
      <div class="mb-3">
        <label class="form-label">pPP</label>
        <input [(ngModel)]="jugador.pPP" name="pPP" class="form-control" type="number" />
      </div>
      <div class="mb-3">
        <label class="form-label">rPP</label>
        <input [(ngModel)]="jugador.rPP" name="rPP" class="form-control" type="number" />
      </div>
      <div class="mb-3">
        <label class="form-label">Porcentaje de tiros</label>
        <input [(ngModel)]="jugador.porcentajeTiros" name="porcentajeTiros" class="form-control" type="number" />
      </div>

      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-secondary" (click)="cancel()">Cancelar</button>
        <button type="submit" class="btn btn-purple" [disabled]="saving()">Guardar</button>
      </div>
    </form>
  </div>
</div>
