<div class="container-fluid px-5 pb-5">
  <div *ngIf="players().length > 0; else noPlayers" 
       class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">
    <div class="col" *ngFor="let jugador of players() | playerFilter:searchText:filterField">
      <div
        [routerLink]="['/detail', jugador.nombre]"
        class="card h-100 shadow-sm border-2 player-card-hover"
        (click)="$event.stopPropagation()"
        style="cursor: pointer; border-radius: 10px; transition: 0.2s;"
      > 
        <div style="height: 200px; overflow: hidden; border-radius: 8px 8px 0 0;">
          <img 
            [src]="jugador.img" 
            [alt]="jugador.nombre" 
            class="img-fluid w-100 h-100 object-fit-cover"
            style="object-position: top;" 
          />
        </div>
        <div class="card-body d-flex flex-column p-4">
          <h5 class="card-title fw-bold mb-3">{{ jugador.nombre }}</h5>
          <a
            [routerLink]="['/detail', jugador.nombre]"
            class="btn btn-purple mt-auto fw-semibold py-2 w-50 align-self-start"
            (click)="$event.stopPropagation()"
          >
            Ver detalle
          </a>
        </div>
      </div>
    </div>
    <div
      [routerLink]="['/nuevo-jugador']"
      class="card h-100 shadow-sm border-2 player-card-hover"
      (click)="toggleShowAdd()"
      style="cursor: pointer; border-radius: 10px; transition: 0.2s;"
    > 
      <div style="height: 200px; overflow: hidden; border-radius: 8px 8px 0 0;">
        <img 
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmqAMwpac4je2zztZMEwYCdihurwZQ8IQF9Q&s"
          alt="Nuevo jugador"
          class="img-fluid w-auto h-75 d-block mx-auto align-self-center mt-4"
          style="object-position: top;" 
        />
      </div>
      <div class="card-body d-flex flex-column p-4">
        <h5 class="card-title fw-bold mb-3">Nuevo Jugador</h5>
        <a
          [routerLink]="['/nuevo-jugador']"
          class="btn btn-purple mt-auto fw-semibold py-2 w-50 align-self-start"
          (click)="toggleShowAdd()"
        >
          Añadir jugador
        </a>
      </div>
    </div>
    <div *ngIf="(players() | playerFilter:searchText:filterField).length === 0" class="col">
      <div class="alert alert-info shadow-sm" role="alert">
        No se encontraron jugadores que coincidan con los criterios de búsqueda.
      </div>
    </div>
  </div>

  <ng-template #noPlayers>
    <div class="alert alert-info shadow-sm" role="alert">
      No hay jugadores disponibles en este momento.
    </div>
  </ng-template>
</div>

<app-add-player *ngIf="showAdd()" (close)="toggleShowAdd()"></app-add-player>
